# ── Conflict resolution flow (CLI output) ─────────────
resolve.all_done = ✔ All done — repository is clean again
resolve.next_round = Next round — more conflicts to resolve
resolve.found = {n} conflicted file(s), entering the resolver…
resolve.quit = Exited with the site preserved; rerun git-pincer to continue, or git-pincer abort to abort
resolve.reading = [{i}/{n}] reading {path} …
resolve.continue_failed = git {op} --continue failed (see git output above).\nHint: if a pre-commit hook rejected the commit (fmt / clippy, …), fix the issue, git add, then rerun git-pincer — resolved conflicts are kept

# ── abort subcommand ──────────────────────────────────
abort.none = no conflict resolution in progress
abort.confirm = Are you sure you want to abort the current {op}? Completed progress will be lost. [y/N]
abort.done = ✔ aborted {op}
abort.cancelled = cancelled

# ── file subcommand ───────────────────────────────────
file.parsed = Parsed {n} conflicts, entering resolution interface…
file.written = ✔ written {path}
file.exited = exited without changes

# ── Resolver UI (messages and status) ─────────────────
ui.quit_confirm = Files still unfinished; press q again to quit (unwritten progress will be lost)
ui.edited = Chunk overwritten with the editor result
ui.edit_cancelled = Edit cancelled
ui.undone_all = All chunk decisions in this file undone
ui.applied_all = All non-conflicting changes applied
ui.copy_chunk = current chunk result
ui.copied_file = Copied the whole file's current result
ui.copy_failed = Copy failed: {e}
ui.copy_local = current chunk local side
ui.copy_remote = current chunk remote side
ui.copied = Copied {what} ({n} lines)
ui.no_clipboard = No clipboard tool found (pbcopy / xclip / wl-copy)
ui.unresolved = Unresolved conflicts remain, cannot write (n jumps to the next one)
ui.written_auto = ✔ Wrote {path} ({n} non-conflicting changes auto-applied)
ui.written = ✔ Wrote {path}
ui.editor_failed = Failed to launch editor {program}
ui.fold = ── ⋯ {n} unchanged lines (z to expand) ⋯ ──
ui.pending = ⋯ pending ⋯
ui.files_badge = {i}/{n} files
ui.conflicts_pending = ✗ {n} conflicts pending
ui.file_ready = ✓ file ready (w to write)
ui.binary_notice = Binary file cannot be merged chunk-by-chunk; choose one side as a whole
ui.binary_keys = h / l choose · u undo · then w to write
ui.bytes = {n} bytes
ui.press_pick = press {key} to choose

