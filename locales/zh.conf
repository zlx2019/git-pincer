# git-pincer 中文文案
# 格式:key = 文案;`#` 开头为注释;`\n` 表示换行;{name} 为运行时占位符。
# 新增 key 时需同步更新 en.conf,单元测试会校验两边 key 集合一致。

# ── 通用 ──────────────────────────────────────────────
common.close_any_key = 按任意键关闭
common.need_tty_menu = 打开选择菜单需要交互式终端(当前 stdout 不是 TTY)
common.need_tty_resolve = 打开冲突解决界面需要交互式终端(当前 stdout 不是 TTY)

# ── 主菜单 / 二级列表 / 弹框 ──────────────────────────
menu.divider = 选择你的指令
menu.status_title = 状 态
menu.command_title = 指 令
menu.branch = 分支
menu.changes = 改动 ×{n}
menu.stashes = 贮藏 ×{n}
menu.ahead = ↑{n} 待推送
menu.no_upstream = 无上游
menu.synced = 已同步
menu.key_move = 移动
menu.key_confirm = 确认
menu.key_flee = 逃跑
menu.list_keys = J/K 移动 · Enter 确认 · Q 返回
menu.running = 执行中…
menu.pull_desc = 拉取远端
menu.pull_hint = 从远端拉取最新提交,更新当前分支。
menu.merge_desc = 合并分支
menu.merge_hint = 选择一个分支,合并进当前分支。
menu.rebase_desc = 变基分支
menu.rebase_hint = 把当前分支的提交重放到所选分支之上。
menu.cherry_desc = 摘取提交
menu.cherry_hint = 摘取其他分支的提交,应用到当前分支。
menu.revert_desc = 撤销提交
menu.revert_hint = 生成一个反向提交,撤销所选提交的改动。
menu.notice_info = 提示
menu.no_branches = 没有可选的目标分支
menu.no_commits = 没有可选的提交
menu.pick_merge = merge:选择要合并进来的分支
menu.pick_rebase = rebase:选择变基目标分支
menu.pick_cherry = cherry-pick:选择要摘取的提交
menu.pick_revert = revert:选择要撤销的提交
menu.failed = git {cmd} 失败
menu.done = git {cmd} 完成
menu.no_output = (无输出)
menu.skipped = ……(已省略前 {n} 行)
menu.no_conflicts = 当前没有需要解决的冲突。

# ── 冲突解决流程(CLI 输出)────────────────────────────
resolve.all_done = ✔ 全部完成,仓库已回到干净状态
resolve.next_round = 进入下一轮,仍有冲突待解决
resolve.found = {n} 个文件存在冲突,进入解决界面…
resolve.quit = 已退出,现场保留;随时运行 git-pincer 继续,或 git-pincer abort 中止
resolve.reading = [{i}/{n}] 读取 {path} …
resolve.continue_failed = git {op} --continue 失败(git 输出见上方)。\n提示:若是 pre-commit 钩子拒绝提交(fmt / clippy 等),修复问题并 git add 后重新运行 git-pincer 即可继续,已解决的冲突不会丢失

# ── abort 子命令 ──────────────────────────────────────
abort.none = 当前没有进行中的冲突解决
abort.confirm = 确定要中止当前的 {op} 吗?已完成的进度将丢失。[y/N]
abort.done = ✔ 已中止 {op}
abort.cancelled = 已取消

# ── file 子命令 ───────────────────────────────────────
file.parsed = 解析到 {n} 处冲突,进入解决界面…
file.written = ✔ 已写入 {path}
file.exited = 已退出,未做修改

# ── 冲突解决界面(消息与状态)──────────────────────────
ui.quit_confirm = 仍有文件未完成;再按一次 q 退出(未写盘的进度将丢弃)
ui.edited = 已用编辑结果覆写当前块
ui.edit_cancelled = 编辑已取消
ui.undone_all = 已撤销本文件全部块的决定
ui.applied_all = 已应用全部非冲突改动
ui.copy_chunk = 当前块结果
ui.copied_file = 已复制整个文件的当前结果
ui.copy_failed = 复制失败:{e}
ui.copy_local = 当前块本地侧
ui.copy_remote = 当前块远端侧
ui.copied = 已复制{what}({n} 行)
ui.unresolved = 仍有未解决的冲突,无法写入(n 跳到下一处冲突)
ui.written_auto = ✔ 已写入 {path}(自动应用了 {n} 处非冲突改动)
ui.written = ✔ 已写入 {path}
ui.editor_failed = 启动编辑器 {program} 失败
ui.fold = ── ⋯ {n} 行未改动 (z 展开) ⋯ ──
ui.pending = ⋯ 待解决 ⋯
ui.files_badge = {i}/{n} 文件
ui.conflicts_pending = ✗ {n} 冲突待解决
ui.file_ready = ✓ 本文件已就绪(w 写盘)
ui.binary_notice = 二进制文件无法逐块合并,请整体选择一侧
ui.binary_keys = h / l 选择 · u 撤销 · 选择后 w 写盘
ui.bytes = {n} 字节
ui.press_pick = 按 {key} 选择

