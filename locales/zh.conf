ui.hint_left = 取左
ui.hint_right = 取右
ui.hint_ignore = 忽略
ui.hint_undo = 撤销
ui.hint_edit = 编辑
ui.hint_conflict = 冲突
ui.hint_write = 写盘
ui.hint_file = 文件
ui.hint_fold = 折叠
ui.hint_quit = 退出
ui.hint_help = 帮助

# ── 帮助面板 ──────────────────────────────────────────
ui.help_title = 按键说明
ui.help_left = 取用本地(两侧先后取用=都要)
ui.help_right = 取用远端改动
ui.help_ignore = 忽略未处理的侧(保留 base)
ui.help_undo = 撤销当前块 / 全部块
ui.help_edit = $EDITOR 编辑当前块
ui.help_apply = 应用全部非冲突改动
ui.help_write = 写盘(自动应用非冲突)
ui.help_quit = 退出(现场保留)
ui.help_move = 上下移动改动块
ui.help_jump = 下/上一个未解决冲突
ui.help_scroll = 视口下/上滚半页(脱离光标跟随)
ui.help_tab = 切换到下一个文件
ui.help_fold = 折叠/展开未改动区域
ui.help_copy_chunk = 复制当前块结果
ui.help_copy_file = 复制整个文件结果
ui.help_copy_sides = 复制块的本地/远端侧
ui.help_help = 打开本帮助

# ── git 封装 ──────────────────────────────────────────
git.no_op = 仓库当前没有进行中的合并操作

# ── 用户配置文件 ──────────────────────────────────────
config.unreadable = 配置文件 {path} 读取失败
config.invalid = 配置文件 {path} 解析失败
config.bad_action = [keys] 中的动作名 "{name}" 不存在;可用动作: {list}
config.bad_key = [keys] 中动作 "{name}" 的键位 "{key}" 无法解析
config.bad_color_name = [theme] 中的颜色名 "{name}" 不存在;可用颜色: {list}
config.bad_color = [theme] 中 "{name}" 的颜色值 "{value}" 非法(应为 #RRGGBB;色带/强调类为 [普通, 选中] 双色)
config.key_conflict = 键位 "{key}" 被绑定到了多个动作
