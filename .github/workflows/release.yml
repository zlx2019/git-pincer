name: Release
# 推送标签时：
#   - 生成 changelog
#   - 创建 github Release（并附加多平台构建产物）
#   - 发布 crate.io
#   - 发布 npm（主包 + 各平台二进制子包）
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ contains(github.ref_name, '-') && format('--unreleased --tag {0}', github.ref_name) || '--latest' }} --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}
          # SemVer 预发布标签(含 "-",如 v0.1.0-rc.1)自动标记为 Pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: Build ${{ matrix.target }}
    if: github.repository != 'zlx2019/rust-cli-template'
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      # Linux cross target (aarch64 / musl) requires the corresponding linker and C toolchain.
      - name: Setup cross toolchain
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Resolve binary name
        id: meta
        shell: bash
        run: echo "bin=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"
      # Compile and package (Unix → tar.gz, Windows → zip) and attach to Release.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ steps.meta.outputs.bin }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          include: README.md,LICENSE
          leading-dir: true
          # 每个产物附带 sha256 校验和文件,供下载方验证完整性
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    if: ${{ !contains(github.ref_name, '-') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      # tag 与 Cargo.toml 版本不一致时中止,防止发出与 tag 不符的版本
      - name: Verify tag matches package version
        run: |
          pkg=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "v$pkg" != "${{ github.ref_name }}" ]; then
            echo "::error::tag ${{ github.ref_name }} 与 Cargo.toml 版本 $pkg 不一致"
            exit 1
          fi
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Download release assets
        run: gh release download "$TAG" --pattern "*.tar.gz" --pattern "*.zip" --dir /tmp/assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 从 release 压缩包组装出 6 个平台子包 + 1 个主包
      - name: Assemble npm packages
        run: node npm/build.mjs "$TAG" /tmp/assets
      # 先发平台子包, 主包最后发, 避免出现主包可装而子包缺失的窗口期
      - name: Publish packages
        run: |
          for pkg in npm/dist/@zero9501/*; do
            npm publish "$pkg" --access public
          done
          npm publish npm/dist/git-pincer --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
