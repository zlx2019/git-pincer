name: Release

# 推送 v* 标签时，生成 Changelog、创建 GitHub Release 并附加多平台构建产物
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # 正式版:--latest 取最近的正式版本节点(预发布不算节点,区间自动覆盖 rc 期间的提交);
          # 预发布:标签不被 tag_pattern 识别,改用 --unreleased 并显式指定版本名
          args: ${{ contains(github.ref_name, '-') && format('--unreleased --tag {0}', github.ref_name) || '--latest' }} --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}
          # SemVer 预发布标签(含 "-",如 v0.1.0-rc.1)自动标记为 Pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: Build ${{ matrix.target }}
    if: github.repository != 'zlx2019/rust-cli-template'
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # musl 静态链接:不依赖 glibc 版本,任何 Linux 发行版可用
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      # Linux 交叉目标(aarch64 / musl)需要对应的链接器与 C 工具链
      - name: Setup cross toolchain
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Resolve binary name
        id: meta
        shell: bash
        run: echo "bin=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"
      # Compile and package (Unix → tar.gz, Windows → zip) and attach to Release.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ steps.meta.outputs.bin }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          include: README.md,LICENSE
          leading-dir: true
          # 每个产物附带 sha256 校验和文件,供下载方验证完整性
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
